<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@450&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container": "#1E1E1E",
            "primary": "#0A84FF",
            "warning": "#FF9500",
            "on-surface": "#FFFFFF",
            "on-surface-variant": "#A1A1A1",
            "outline-variant": "rgba(255, 255, 255, 0.1)"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "md": "16px",
            "xl": "32px",
            "margin-desktop": "40px",
            "margin-mobile": "16px",
            "sm": "8px",
            "xs": "4px",
            "unit": "4px",
            "lg": "24px",
            "gutter": "16px"
          },
          "fontFamily": {
            "body-md": ["Inter"],
            "body-sm": ["Inter"],
            "headline-lg": ["Inter"],
            "headline-md": ["Inter"],
            "code-sm": ["JetBrains Mono"],
            "label-caps": ["Inter"],
            "headline-sm": ["Inter"]
          },
          "fontSize": {
            "body-md": ["14px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
            "body-sm": ["13px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
            "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
            "code-sm": ["13px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "450"}],
            "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "headline-sm": ["18px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      background-color: #09090b;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .widget-medium {
      width: 328px;
      height: 155px;
      background-color: #1E1E1E;
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 26px; /* Precise iOS Widget Radius */
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .github-cell {
      width: 6px;
      height: 6px;
      border-radius: 1.5px;
    }
    .ping-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #0A84FF;
      box-shadow: 0 0 8px rgba(10, 132, 255, 0.4);
    }
    .apple-glass {
      background: rgba(30, 30, 30, 0.7);
      backdrop-filter: blur(20px);
    }
  </style>
</head>
<body>
<!-- Widget Container -->
<div class="widget-medium shadow-2xl apple-glass">
<!-- Header -->
<div class="flex items-center justify-between px-md pt-sm pb-xs z-10">
<span class="font-label-caps text-[10px] text-white/60 tracking-wider font-bold">INFRASTRUCTURE</span>
<span class="material-symbols-outlined text-primary text-[14px]" style="font-variation-settings: 'FILL' 1;">sensors</span>
</div>
<!-- Main 3-Column Content -->
<div class="flex-1 grid grid-cols-3 z-10 px-sm pb-sm">
<!-- Column 1: GitHub -->
<div class="flex flex-col justify-between px-xs py-xs border-r border-white/10">
<div class="flex items-center gap-xs mb-xs">
<span class="material-symbols-outlined text-[14px] text-white/80">account_tree</span>
<span class="font-label-caps text-[9px] text-white/60 font-bold">GITHUB</span>
</div>
<!-- Contribution-like Grid -->
<div class="grid grid-cols-4 gap-[3px] mb-sm">
<div class="github-cell bg-primary"></div>
<div class="github-cell bg-white/10"></div>
<div class="github-cell bg-primary/60"></div>
<div class="github-cell bg-primary/40"></div>
<div class="github-cell bg-primary/80"></div>
<div class="github-cell bg-primary"></div>
<div class="github-cell bg-white/10"></div>
<div class="github-cell bg-primary/50"></div>
</div>
<div class="mt-auto">
<span class="font-code-sm text-code-sm text-primary font-bold block">12</span>
<span class="font-body-sm text-[9px] text-white/50 block leading-tight font-bold uppercase">Pushes</span>
</div>
</div>
<!-- Column 2: Docker -->
<div class="flex flex-col justify-between px-sm py-xs border-r border-white/10">
<div class="flex items-center gap-xs mb-xs">
<span class="material-symbols-outlined text-[14px] text-white/80">token</span>
<span class="font-label-caps text-[9px] text-white/60 font-bold uppercase">Docker</span>
</div>
<div class="space-y-sm mt-xs">
<div class="flex justify-between items-baseline">
<span class="font-body-sm text-[9px] text-white/50 font-bold uppercase">Up</span>
<span class="font-code-sm text-code-sm text-primary font-bold">8</span>
</div>
<div class="w-full bg-white/10 h-[3px] rounded-full overflow-hidden">
<div class="bg-primary h-full w-[80%]"></div>
</div>
<div class="flex justify-between items-baseline">
<span class="font-body-sm text-[9px] text-white/50 font-bold uppercase">Off</span>
<span class="font-code-sm text-code-sm text-warning font-bold">2</span>
</div>
</div>
</div>
<!-- Column 3: Server Ping -->
<div class="flex flex-col justify-between px-sm py-xs">
<div class="flex items-center justify-between mb-xs">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px] text-white/80">dns</span>
<span class="font-label-caps text-[9px] text-white/60 font-bold uppercase">VPS</span>
</div>
<div class="ping-dot animate-pulse"></div>
</div>
<div class="mt-auto flex flex-col items-end">
<div class="font-code-sm text-code-sm text-warning text-right font-bold">24ms</div>
<span class="font-body-sm text-[9px] text-white/50 block text-right font-bold uppercase">Latency</span>
<div class="flex gap-[2px] mt-sm h-4 items-end">
<div class="w-[3px] bg-white/10 h-2"></div>
<div class="w-[3px] bg-primary/40 h-3"></div>
<div class="w-[3px] bg-primary/60 h-2"></div>
<div class="w-[3px] bg-primary h-4"></div>
<div class="w-[3px] bg-primary/80 h-3"></div>
</div>
</div>
</div>
</div>
<!-- Micro Interaction Overlay -->
<div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent opacity-50"></div>
</div>
<script>
    document.querySelector('.widget-medium').addEventListener('mousemove', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const glow = `radial-gradient(circle at ${x}px ${y}px, rgba(10, 132, 255, 0.08) 0%, transparent 60%)`;
      e.currentTarget.style.backgroundImage = glow;
    });

    document.querySelector('.widget-medium').addEventListener('mouseleave', (e) => {
      e.currentTarget.style.backgroundImage = 'none';
    });
  </script>
</body></html>
