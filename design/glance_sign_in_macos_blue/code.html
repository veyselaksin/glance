<style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .glass-panel {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .primary-gradient-btn {
            background: linear-gradient(180deg, #007AFF 0%, #0056B3 100%);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .primary-gradient-btn:hover {
            background: linear-gradient(180deg, #1A85FF 0%, #0062CC 100%);
        }

        .primary-gradient-btn:active {
            transform: scale(0.98);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Subtle scanline effect removed for cleaner macOS aesthetic */
        .scanline {
            display: none;
        }
    </style>

<body class="flex items-center justify-center min-h-screen">
<!-- Atmospheric background -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#007AFF]/10 rounded-full blur-[128px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#007AFF]/5 rounded-full blur-[128px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-20 w-full max-w-[420px] px-margin-mobile md:px-0">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="mb-md flex items-center justify-center p-sm glass-panel rounded-xl">
<span class="material-symbols-outlined text-primary text-[32px]">sensors</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface tracking-tight">
                Glance
            </h1>
<p class="font-body-md text-on-surface-variant mt-xs">
                Performance tracking for developers
            </p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-2xl p-xl shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-150">
<div class="text-center mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface font-semibold">
                    Connect your workflow
                </h2>
<p class="font-body-sm text-on-surface-variant mt-sm">
                    Authenticate to access your dashboard and server logs.
                </p>
</div>
<!-- Primary Action -->
<button class="primary-gradient-btn w-full flex items-center justify-center gap-sm py-md px-lg rounded-xl transition-all duration-200 group">
<svg class="text-on-primary" fill="currentColor" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">

</svg>
<span class="font-body-md font-semibold text-on-primary">Sign in with GitHub</span>

<div class="w-px h-3 bg-white/10"></div>
<span>Build 2409-F</span>
</div>
</main>
<!-- Interactive script for visual flair -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const lights = document.querySelectorAll('.rounded-full.blur-\\[128px\\]');
            lights[0].style.transform = `translate(${x * 30}px, ${y * 30}px)`;
            lights[1].style.transform = `translate(${-x * 20}px, ${-y * 20}px)`;
        });
    </script>
