<body class="flex items-center justify-center min-h-screen p-md">
<!-- Main Widget Container -->
<div class="relative z-10">
<!-- macOS Widget (Small Size: 158x158pt) -->
<div class="widget-canvas glass-panel rounded-[24px] p-[14px] flex flex-col justify-between shadow-2xl relative overflow-hidden group hover:scale-[1.02] transition-transform duration-300">
<!-- Header Section -->
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant tracking-wider uppercase">Contributions</span>
<div class="flex items-baseline gap-xs mt-xs">
<span class="font-headline-md text-headline-md text-on-surface font-extrabold leading-none">12</span>
<span class="font-body-sm text-body-sm text-mac-blue font-medium">Today</span>
</div>
</div>
<div class="flex items-center gap-xs">
<div class="w-1.5 h-1.5 rounded-full bg-mac-blue animate-status shadow-[0_0_8px_rgba(10,132,255,0.6)]"></div>
</div>
</div>
<!-- Visualization: Mini GitHub Grid -->
<div class="grid grid-cols-7 gap-[3px] my-sm">
<!-- Row 1 -->
<div class="contribution-cell bg-white/5"></div>
<div class="contribution-cell bg-mac-blue/20"></div>
<div class="contribution-cell bg-mac-blue/40"></div>

<div class="contribution-cell bg-white/60"></div>
<div class="contribution-cell bg-white/80"></div>
<div class="contribution-cell bg-white"></div>
<!-- Row 2 -->
<div class="contribution-cell bg-mac-blue/40"></div>
<div class="contribution-cell bg-white/5"></div>
<div class="contribution-cell bg-mac-blue/20"></div>
<div class="contribution-cell bg-white/5"></div>
<div class="contribution-cell bg-mac-blue/20"></div>
<div class="contribution-cell bg-white/5"></div>
<div class="contribution-cell bg-white/5"></div>
<!-- Row 3 -->
<div class="contribution-cell bg-white/5"></div>
<div class="contribution-cell bg-white/5"></div>
<div class="contribution-cell bg-white/60"></div>
<div class="contribution-cell bg-mac-blue/40"></div>
<div class="contribution-cell bg-mac-blue/20"></div>
<div class="contribution-cell bg-white/5"></div>
<div class="contribution-cell bg-mac-blue"></div>
</div>
<!-- Footer: Brand Watermark -->

<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px] text-mac-blue">sensors</span>
<span class="font-code-sm text-code-sm text-on-surface-variant">Glance</span>
</div>
<span class="font-code-sm text-code-sm text-on-surface-variant/40">v1.0</span>
</div>
<!-- Decorative Glow (Invisible by default, reveals on hover) -->
<div class="absolute -bottom-4 -right-4 w-16 h-16 bg-mac-blue/10 blur-2xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
</div>
<!-- Annotation for presentation -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant italic">WidgetKit Small • 158 x 158</p>
</div>
</div>
<!-- Background Interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const widget = document.querySelector('.widget-canvas');
            if(!widget) return;
            const rect = widget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Subtle tilt effect
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;
            
            widget.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
        });

        document.addEventListener('mouseleave', () => {
            const widget = document.querySelector('.widget-canvas');
            if(!widget) return;
            widget.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        });
    </script>
