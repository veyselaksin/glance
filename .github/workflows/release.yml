name: Release and Update Homebrew

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails from Source
        run: |
          git clone https://github.com/wailsapp/wails.git
          cd wails/v2/cmd/wails
          GOWORK=off go install
          cd ../../../..
          rm -rf wails

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          cd ..

      - name: Build Wails App
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform darwin/universal

      - name: Ad-hoc Code Sign
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          codesign --force --deep --sign - build/bin/Glance.app

      - name: Install create-dmg tool
        run: brew install create-dmg

      - name: Build DMG Package
        run: |
          # Hasarsız ve karantinasız kurulum sağlayan .dmg imajını üretiyoruz
          create-dmg \
            --volname "Glance Installer" \
            --volicon "build/darwin/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Glance.app" 175 190 \
            --app-drop-link 425 190 \
            "Glance-macOS.dmg" \
            "build/bin/Glance.app"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: Glance-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate SHA256 and Update Homebrew Cask
        run: |
          SHA256_HASH=$(shasum -a 256 Glance-macOS.dmg | awk '{print $1}')
          VERSION=${GITHUB_REF#refs/tags/v}

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/veyselaksin/homebrew-tap.git homebrew-repo
          cd homebrew-repo

          mkdir -p Casks

          printf 'cask "glance" do\n  version "%s"\n  sha256 "%s"\n\n  url "https://github.com/veyselaksin/glance/releases/download/v#{version}/Glance-macOS.dmg"\n  name "Glance"\n  desc "Developer dashboard for monitoring GitHub stats, Docker and VPS"\n  homepage "https://github.com/veyselaksin/glance"\n\n  app "Glance.app"\nend\n' "$VERSION" "$SHA256_HASH" > Casks/glance.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/glance.rb
          git commit -m "bump: update glance to v${VERSION} with dmg package"
          git push origin main
