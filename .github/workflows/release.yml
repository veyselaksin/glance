name: Release Glance

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App (universal binary)
        run: wails build -platform darwin/universal

      - name: Ad-hoc Code Sign
        run: codesign --force --deep --sign - build/bin/Glance.app

      - name: Compress App to ZIP
        run: |
          cd build/bin
          zip -r ../../Glance-macOS.zip Glance.app
          cd ../..

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Glance-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
