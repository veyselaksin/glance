name: Release Glance

on:
  push:
    tags:
      - "v*"

# GitHub Actions'ın repoya yazma ve release oluşturma yetkisini açıyoruz
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails from Source
        run: |
          git clone https://github.com/wailsapp/wails.git
          cd wails/v2/cmd/wails
          GOWORK=off go install
          cd ../../../..
          rm -rf wails

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          cd ..

      - name: Build Wails App
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform darwin/universal

      - name: Ad-hoc Code Sign
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          codesign --force --deep --sign - build/bin/Glance.app

      - name: Compress App to ZIP
        run: |
          cd build/bin
          zip -r ../../Glance-macOS.zip Glance.app
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Glance-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
