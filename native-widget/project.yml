# XcodeGen spec for the Glance macOS WidgetKit extension.
# Built automatically by scripts/embed-widget.sh during `wails build`.
# The .appex is embedded into Glance.app/Contents/PlugIns/ — users never
# need a separate Xcode host app.
name: GlanceWidget
options:
  bundleIdPrefix: com.wails
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: $(TARGET_NAME)
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  GlanceWidget:
    type: app-extension
    platform: macOS
    sources:
      - GlanceWidget.swift
      - GlanceWidgetBundle.swift
    info:
      path: Generated/GlanceWidget-Info.plist
      properties:
        CFBundleDisplayName: Glance
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Generated/GlanceWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.temporary-exception.files.home-relative-path.read-only:
          - Library/Application Support/Glance/
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wails.Glance.widget
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework

schemes:
  GlanceWidget:
    build:
      targets:
        GlanceWidget: all
    run:
      config: Debug
    archive:
      config: Release
